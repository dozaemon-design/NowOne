name: Deploy WordPress Theme to Core-X

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1.5 Node.js セットアップ（Viteビルド用）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 1.6 Install dependencies
      - name: Install dependencies
        run: npm ci

      # 1.7 Build assets
      - name: Build assets
        run: npm run build

      # 2. SSH エージェントセットアップ
      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.COREX_SSH_PRIVATE_KEY }}

      # 3. サーバー公開鍵を known_hosts に追加
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan ${{ secrets.COREX_SSH_HOST }} >> ~/.ssh/known_hosts

      # 4. rsync でテーマをデプロイ
      - name: Deploy theme via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='.DS_Store' \
            --exclude='*/.DS_Store' \
            --exclude='._*' \
            --exclude='node_modules/' \
            --exclude='src/' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='pnpm-lock.yaml' \
            --exclude='yarn.lock' \
            --exclude='tsconfig.json' \
            --exclude='vite.config.*' \
            --exclude='.nvmrc' \
            --exclude='*.map' \
            --exclude='/vendor/' \
            ./ \
            ${{ secrets.COREX_SSH_USER }}@${{ secrets.COREX_SSH_HOST }}:/home/nowonestudio/domains/nowone.jp/public_html/wp-content/themes/nowone/
